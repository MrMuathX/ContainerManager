<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ContainerManager — Login</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap">
  <style>
    :root {
      --bg: #030712;
      --glass: rgba(17, 24, 39, 0.7);
      --border: rgba(56, 189, 248, 0.2);
      --text: #f0f9ff;
      --text-muted: #94a3b8;
      --primary: #0ea5e9;
      --primary-hover: #38bdf8;
      --error: #f43f5e;
      --radius: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg);
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(14, 165, 233, 0.15), transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(99, 102, 241, 0.1), transparent 45%);
      background-attachment: fixed;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', system-ui, sans-serif;
      color: var(--text);
      overflow: hidden;
    }

    .login-card {
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 48px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5),
                  0 0 40px rgba(14, 165, 233, 0.1);
      animation: card-appear 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    }

    @keyframes card-appear {
      from { opacity: 0; transform: translateY(20px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-container {
      margin-bottom: 24px;
      position: relative;
      display: inline-block;
    }

    .logo-container img {
      filter: drop-shadow(0 0 12px rgba(14, 165, 233, 0.5));
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .logo-container:hover img {
      transform: scale(1.1) rotate(-5deg);
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      margin-bottom: 8px;
      background: linear-gradient(to right, #f0f9ff, #0ea5e9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .form-group {
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 8px;
      transition: color 0.2s;
    }

    .input-wrapper {
      position: relative;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: white;
      font-size: 1rem;
      outline: none;
      transition: all 0.2s;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.15);
      background: rgba(0, 0, 0, 0.4);
    }

    input:focus + label {
      color: var(--primary);
    }

    button {
      width: 100%;
      padding: 12px;
      background: var(--primary);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    button:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(14, 165, 233, 0.3);
    }

    button:active {
      transform: translateY(0);
    }

    .error-msg {
      color: var(--error);
      font-size: 0.875rem;
      margin-top: 16px;
      text-align: center;
      min-height: 20px;
      background: rgba(244, 63, 94, 0.1);
      padding: 8px;
      border-radius: 8px;
      border: 1px solid rgba(244, 63, 94, 0.2);
      display: none;
    }

    .footer-text {
      text-align: center;
      margin-top: 32px;
      font-size: 0.8rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="header">
      <div class="logo-container">
        <img src="/logo.png" alt="Logo" width="48" height="48">
      </div>
      <h1>Welcome back</h1>
      <p class="subtitle">Log in to manage your containers</p>
    </div>

    <div class="form-group">
      <label for="pw">Dashboard Password</label>
      <div class="input-wrapper">
        <input type="password" id="pw" placeholder="••••••••" autofocus autocomplete="current-password">
      </div>
    </div>

    <button id="loginBtn" onclick="doLogin()">
      Sign in
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
      </svg>
    </button>

    <div class="error-msg" id="err"></div>

    <p class="footer-text">ContainerManager v1.0.0</p>
  </div>

  <script>
    async function doLogin() {
      const pwInput = document.getElementById('pw');
      const loginBtn = document.getElementById('loginBtn');
      const errDiv = document.getElementById('err');
      const pw = pwInput.value;

      if (!pw) {
        showError('Please enter a password');
        return;
      }

      loginBtn.disabled = true;
      loginBtn.innerHTML = 'Signing in...';
      errDiv.style.display = 'none';

      try {
        const r = await fetch('/api/auth/login', { 
          method: 'POST', 
          headers: { 'Content-Type': 'application/json' }, 
          body: JSON.stringify({ password: pw }), 
          credentials: 'include' 
        });

        if (r.ok) {
          window.location.href = '/';
        } else {
          showError('Invalid dashboard password');
        }
      } catch (e) {
        showError('Service unreachable. Try again later.');
      } finally {
        loginBtn.disabled = false;
        loginBtn.innerHTML = 'Sign in <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>';
      }
    }

    function showError(msg) {
      const errDiv = document.getElementById('err');
      errDiv.textContent = msg;
      errDiv.style.display = 'block';
      errDiv.style.animation = 'shake 0.4s linear';
      setTimeout(() => { errDiv.style.animation = ''; }, 400);
    }

    document.getElementById('pw').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });

    // Add a simple shake animation for errors
    const style = document.createElement('style');
    style.textContent = `
      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-5px); }
        50% { transform: translateX(5px); }
        75% { transform: translateX(-5px); }
      }
    `;
    document.head.appendChild(style);
  </script>
</body>
</html>
